name = "pp-pricing-worker"
main = "src/index.ts"
compatibility_date = "2026-03-07"

[[kv_namespaces]]
binding = "PRICING_KV"
id = "a413f954ffca49c1b620f7b8bb83b051"
preview_id = "3427c02da52d443cb317985d80c1044f"

[triggers]
crons = ["0 */6 * * *"]

[vars]
VOUCHERIFY_BASE_URL = "https://as1.api.voucherify.io"
ALLOWED_ORIGINS = "https://pocketpills.com,https://www.pocketpills.com"
PRICING_CURRENCY = "CAD"
PRICING_LOCALE = "en-CA"
PRICING_CURRENCY_SYMBOL = "$"

# Secrets (set via `wrangler secret put`):
# VOUCHERIFY_APP_ID
# VOUCHERIFY_SECRET_KEY
# VOUCHERIFY_WEBHOOK_SECRET
